<nav class="tab-bar">
  @for (tab of tabs; track tab.path) {
    <a class="tab-btn" [routerLink]="tab.path" routerLinkActive="active">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path [attr.d]="tab.icon" />
      </svg>
      <span>{{ tab.label }}</span>
    </a>
  }
</nav>
