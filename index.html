<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AthleteOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Hebrew:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app-shell">

  <header class="app-header">
    <img src="../logo.png" alt="AthleteOS">
    <div>
      <div class="title">AthleteOS</div>
      <div class="subtitle">MOVE · TRAIN · BECOME</div>
    </div>
  </header>

  <main id="view-plan" class="view">
    <div id="day-pills" class="day-pills"></div>
    <div id="day-content"></div>
  </main>

  <main id="view-philosophy" class="view" hidden>
    <div class="tagline" id="philosophy-tagline"></div>
    <p class="intro-text" id="philosophy-intro"></p>

    <div class="section-title">עקרונות מנחים</div>
    <div class="card-grid" id="philosophies-grid"></div>

    <div class="section-title">10 עמודי התווך של האתלט</div>
    <div class="pillars-grid" id="pillars-grid"></div>

    <div class="section-title">השרשרת היומית</div>
    <ol class="chain-list" id="chain-list"></ol>

    <div class="closing-line" id="closing-line"></div>
  </main>

  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="plan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18"/><path d="M8 2v4M16 2v4"/></svg>
      תוכנית
    </button>
    <button class="tab-btn" data-tab="philosophy">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 6v6c0 5 3.5 8.5 8 10 4.5-1.5 8-5 8-10V6l-8-4z"/></svg>
      פילוסופיה
    </button>
  </nav>

</div>

<script src="icons.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
